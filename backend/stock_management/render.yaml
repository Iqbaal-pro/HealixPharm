services:
  - type: web
    name: healix-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_SMS_FROM_NUMBER
        sync: false
      - key: AUTH_SECRET_KEY
        sync: false
      - key: REFILL_THRESHOLD
        value: 3
      - key: SMS_SIMULATE
        value: "true"
